# version: '3.9'

services:
  eaglemes-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eaglemes-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - eaglemes-sqlserver-data:/var/opt/mssql
    networks:
      - eaglemes-network

  eaglemes-api:
    build:
      context: .
      dockerfile: backend/EagleMES.Api/Dockerfile
    container_name: eaglemes-api
    ports:
      - "5001:8080"
    depends_on: 
        eaglemes-sqlserver:
          condition: service_started
        rabbitmq:
          condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080 
      RABBITMQ__HOSTNAME: rabbitmq
      ConnectionStrings__DefaultConnection: "Server=eaglemes-sqlserver;Database=EagleMes;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
    networks:
      - eaglemes-network

  rabbitmq:
      image: rabbitmq:3-management
      container_name: rabbitmq
      restart: unless-stopped
      ports:
        - "5672:5672"
        - "15672:15672"
      healthcheck:
        test: ["CMD", "rabbitmq-diagnostics", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5
      networks:
        - eaglemes-network
volumes:
  eaglemes-sqlserver-data:

networks:
  eaglemes-network: